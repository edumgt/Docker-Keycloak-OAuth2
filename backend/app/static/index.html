<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Auth FE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-6xl px-4 py-10 md:px-8">
      <section class="grid gap-8 md:grid-cols-2">
        <div class="rounded-2xl border border-cyan-400/30 bg-slate-900/70 p-6 shadow-2xl shadow-cyan-500/10">
          <p class="text-xs uppercase tracking-[0.24em] text-cyan-300">Docker + Keycloak + Python</p>
          <h1 class="mt-3 text-3xl font-black text-cyan-100 md:text-4xl">Tailwind Login Frontend</h1>
          <p class="mt-4 text-sm leading-7 text-slate-300">
            Keycloak Direct Grant로 토큰을 발급하고 로그인 후 `userinfo`를 조회합니다.
          </p>
          <div class="mt-6 grid grid-cols-1 gap-3 text-sm text-slate-300">
            <div class="rounded-lg border border-slate-700 bg-slate-900 p-3">
              API Base: <span class="font-semibold text-cyan-300">/api/v1</span>
            </div>
            <div class="rounded-lg border border-slate-700 bg-slate-900 p-3">
              Realm: <span class="font-semibold text-cyan-300">integrated-id</span>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
          <h2 class="text-xl font-bold text-white">로그인</h2>
          <p class="mt-2 text-sm text-slate-400">데모 계정으로 로그인 가능</p>

          <form id="login-form" class="mt-6 space-y-4">
            <label class="block text-sm">
              <span class="mb-1 block text-slate-300">Username</span>
              <input
                id="username"
                type="text"
                required
                value="demo-user"
                class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 focus:border-cyan-400 focus:outline-none"
              />
            </label>
            <label class="block text-sm">
              <span class="mb-1 block text-slate-300">Password</span>
              <input
                id="password"
                type="password"
                required
                value="demo1234"
                class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 focus:border-cyan-400 focus:outline-none"
              />
            </label>

            <button
              id="login-btn"
              type="submit"
              class="w-full rounded-lg bg-cyan-500 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-400"
            >
              로그인
            </button>
          </form>

          <div id="status-badge" class="mt-4 hidden rounded-lg border px-3 py-2 text-sm"></div>
        </div>
      </section>

      <section class="mt-8 grid gap-6 md:grid-cols-2">
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <h3 class="text-sm font-semibold uppercase tracking-wide text-cyan-300">Access Token (JWT)</h3>
          <pre id="token-output" class="mt-3 max-h-72 overflow-auto break-all rounded-md bg-slate-950 p-3 text-xs text-slate-200"></pre>
        </div>
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-5">
          <h3 class="text-sm font-semibold uppercase tracking-wide text-cyan-300">User Info</h3>
          <pre id="userinfo-output" class="mt-3 max-h-72 overflow-auto rounded-md bg-slate-950 p-3 text-xs text-slate-200"></pre>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const tokenOutput = document.getElementById("token-output");
      const userInfoOutput = document.getElementById("userinfo-output");
      const statusBadge = document.getElementById("status-badge");

      const showStatus = (ok, text) => {
        statusBadge.classList.remove("hidden", "border-emerald-400/60", "bg-emerald-500/10", "text-emerald-200", "border-red-400/60", "bg-red-500/10", "text-red-200");
        statusBadge.classList.add(
          ok ? "border-emerald-400/60" : "border-red-400/60",
          ok ? "bg-emerald-500/10" : "bg-red-500/10",
          ok ? "text-emerald-200" : "text-red-200"
        );
        statusBadge.textContent = text;
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        tokenOutput.textContent = "";
        userInfoOutput.textContent = "";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const tokenRes = await fetch("/api/v1/auth/token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const tokenData = await tokenRes.json();
          if (!tokenRes.ok) {
            throw new Error(tokenData.detail || "Token issue failed");
          }

          tokenOutput.textContent = tokenData.access_token;

          const userInfoRes = await fetch("/api/v1/auth/userinfo", {
            method: "GET",
            headers: {
              Authorization: `Bearer ${tokenData.access_token}`,
            },
          });

          const userInfoData = await userInfoRes.json();
          if (!userInfoRes.ok) {
            throw new Error(userInfoData.detail || "Userinfo failed");
          }

          userInfoOutput.textContent = JSON.stringify(userInfoData.payload, null, 2);
          showStatus(true, "로그인 성공: JWT 발급 및 userinfo 조회 완료");
        } catch (error) {
          showStatus(false, `로그인 실패: ${error.message}`);
        }
      });
    </script>
  </body>
</html>
