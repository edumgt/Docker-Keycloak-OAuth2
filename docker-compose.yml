x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
    AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-dev-secret-key-change-in-prod"
    AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8888"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    KEYCLOAK_BASE_URL: http://keycloak:8080
    KEYCLOAK_REALM: integrated-id
    BACKEND_BASE_URL: http://backend:8000
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: dko-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: dko-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin1234
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  capture:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: dko-capture
    profiles: ["tools"]
    working_dir: /work
    entrypoint: ["/bin/bash", "-lc"]
    volumes:
      - ./:/work
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dko-backend
    environment:
      DATABASE_URL: postgresql+psycopg://app_user:app_pass@postgres:5432/app_db
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: integrated-id
      KEYCLOAK_CLIENT_ID: be-client
      KEYCLOAK_CLIENT_SECRET: be-client-secret
      KEYCLOAK_REDIRECT_URI: http://localhost:8000/docs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  airflow-init:
    <<: *airflow-common
    container_name: dko-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade &&
        echo "Airflow DB initialised."
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: dko-airflow-webserver
    command: webserver
    ports:
      - "8888:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: dko-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  airflow_logs:
